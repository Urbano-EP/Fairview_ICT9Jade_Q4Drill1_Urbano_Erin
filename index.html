<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Killowat per hour</h1>

    <h2>Check KWH average</h2>
    <br>
   <input id="KWHInput"
    <button class="btn btn-info" onclick="CheckKWH()">Check KWH</button>

    <script>
        function CheckKWH(){
            var KWH = 0;
            if (isNaN(KWH) || KWH < 0) {
                alert("Please assign a valid number");
            }
            else if (KWH < 100){
                alert("You're a lifeline Consumer");
            }
            else if(KWH >= 200){
                alert("You're a low consumer");
            }
            else if(KWH >= 300){
                alert("You're an average consumer");
            }
            else if(KWH >= 500){
                alert("You're a high consumer");
            }
            else if(KWH < 500){
                alert("You're a very high consumer");
            }

            else{
                alert("KWH could not be classified");
            }
        }
    </script>

</body>
</html>
