<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    
    

    <br><br>
    
    <div class="container bg-success text-light rounded text-center" style="height: 400px; width: 450px;">
        <br><br>

    <h1 class="fw-bold display-4 fst-italic">KWH Classification</h1>

    <details class="ontoggle">
        <summary>Instructions:</summary>
        <p id="Instructions"></p>

       Input your KWH then press the buton
    </details>
    <br><br><br>

   <input id="KWHInput" type="number" placeholder="Enter KWH">

    <button class="btn btn-info rounded" onclick="CheckKWH()">Check KWH</button>

    <script>
        function CheckKWH(){
            var KWH = document.getElementById("KWHInput").value;

            if (isNaN(KWH) || KWH < 0) {
                alert("Please assign a valid number");
            }
            else if (KWH < 100){
                alert("You're a lifeline Consumer");
            }
            else if(KWH <= 200){
                alert("You're a low consumer");
            }
            else if(KWH <= 300){
                alert("You're an average consumer");
            }
            else if(KWH <= 500){
                alert("You're a high consumer");
            }

            else{
                alert("You're a very high consumer");
            }
        }
    </script>

</body>
</html>
